apiVersion: apps/v1
kind: Deployment
metadata:
  name: site1
  namespace: user1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: site1
  template:
    metadata:
      labels:
        app: site1
    spec:
      containers:
      - name: nginx
        image: nginx
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: site1
  namespace: user1
spec:
  selector:
    app: site1
  ports:
    - port: 80
      targetPort: 80
