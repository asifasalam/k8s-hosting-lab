apiVersion: apps/v1
kind: Deployment
metadata:
  name: site2
  namespace: user2
spec:
  replicas: 1
  selector:
    matchLabels:
      app: site2
  template:
    metadata:
      labels:
        app: site2
    spec:
      containers:
      - name: apache
        image: httpd
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: site2
  namespace: user2
spec:
  selector:
    app: site2
  ports:
    - port: 80
      targetPort: 80
